# Rsyslog — mail logs to persistent volume (container-safe, no imklog)
module(load="imuxsock")

$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

mail.*                          /var/log/mail/mail.log
& stop
